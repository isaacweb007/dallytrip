const store = {
  loggedIn: sessionStorage.getItem('dt_admin') === '1',
  products: JSON.parse(localStorage.getItem('dt_admin_products') || 'null') || seedProducts(),
  bookings: JSON.parse(localStorage.getItem('dt_admin_bookings') || 'null') || seedBookings(),
  payments: JSON.parse(localStorage.getItem('dt_admin_payments') || 'null') || seedPayments(),
  users: JSON.parse(localStorage.getItem('dt_admin_users') || 'null') || seedUsers(),
  banners: JSON.parse(localStorage.getItem('dt_admin_banners') || 'null') || seedBanners(),
  settings: JSON.parse(localStorage.getItem('dt_admin_settings') || 'null') || { wallet:'EQADMIN...9zZ', fee:'0%', email:'admin@dallytrip.io' }
};
function persist() {
  localStorage.setItem('dt_admin_products', JSON.stringify(store.products));
  localStorage.setItem('dt_admin_bookings', JSON.stringify(store.bookings));
  localStorage.setItem('dt_admin_payments', JSON.stringify(store.payments));
  localStorage.setItem('dt_admin_users', JSON.stringify(store.users));
  localStorage.setItem('dt_admin_banners', JSON.stringify(store.banners));
  localStorage.setItem('dt_admin_settings', JSON.stringify(store.settings));
}

const fmt = n => Number(n).toLocaleString('en-US');
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){ const wrap=document.getElementById('toasts'); const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<span class="dot"></span><span>${escapeHtml(msg)}</span>`; wrap.appendChild(el); setTimeout(()=>el.style.opacity=0,2400); setTimeout(()=>el.remove(),2700); }

// City translations
const CITY_TR = {
  'Da Nang':    { ko:'다낭',    en:'Da Nang',    ja:'ダナン',    zh:'岘港' },
  'Nha Trang':  { ko:'나트랑',  en:'Nha Trang',  ja:'ニャチャン',zh:'芽庄' },
  'Phu Quoc':   { ko:'푸꾸옥',  en:'Phu Quoc',   ja:'フーコック',zh:'富国岛' },
  'Ho Chi Minh':{ ko:'호치민',  en:'Ho Chi Minh',ja:'ホーチミン',zh:'胡志明' },
  'Mui Ne':     { ko:'무이네',  en:'Mui Ne',     ja:'ムイネー', zh:'美奈' },
};
const trCity = c => { const lang = window.__dtLang ? window.__dtLang.getLang() : 'en'; return (CITY_TR[c]||{})[lang] || c; };

const STATUS_OPTIONS = ['Payment Completed','Pending Confirmation','Confirmed','Completed','Cancel Requested','Cancelled'];
function badgeForStatus(s){ return ({
  'Payment Completed':'status-paid',
  'Pending Confirmation':'status-pending',
  'Confirmed':'status-confirmed',
  'Completed':'status-completed',
  'Cancel Requested':'orange',
  'Cancelled':'status-cancelled',
  'Refunded':'gray',
  'Live':'green', 'Hidden':'gray', 'Active':'green', 'Suspended':'red'
})[s] || 'gray'; }

// ================= Pages =================
function loginPage() {
  return `
  <div style="min-height:100vh; display:grid; place-items:center; padding:24px;">
    <div class="glass-panel" style="width:100%; max-width:420px; padding:36px;">
      <div class="row space-between items-center">
        <a class="brand" href="./index.html">
          <span class="brand-logo">
            <img src="./assets/character-mascot.png" alt="DallyTrip" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';" />
            <span class="char-fallback" style="display:none;">💵</span>
          </span>
          <span>${t('admin.brand')}</span>
        </a>
        <span data-dt-lang-mount></span>
      </div>
      <h2 class="h2 mt-16" style="font-size:28px;">${t('admin.login.welcome')}</h2>
      <p class="t-muted mt-8">${t('admin.login.desc')}</p>
      <form onsubmit="event.preventDefault();doLogin();" class="mt-24 col gap-12">
        <div class="field">
          <label>${t('common.email')}</label>
          <input class="glass-input" id="loginEmail" type="email" placeholder="admin@dallytrip.io" value="admin@dallytrip.io" />
        </div>
        <div class="field">
          <label>${t('common.password')}</label>
          <input class="glass-input" id="loginPw" type="password" placeholder="••••••••" value="admin1234" />
        </div>
        <button class="btn btn-primary btn-block btn-lg mt-8" type="submit">${t('btn.signin')}</button>
        <a href="./index.html" class="btn btn-ghost btn-block">${t('btn.backSite')}</a>
      </form>
    </div>
  </div>
  `;
}
function doLogin() {
  const e = document.getElementById('loginEmail').value;
  const p = document.getElementById('loginPw').value;
  if (e && p) { sessionStorage.setItem('dt_admin','1'); store.loggedIn=true; location.hash='#/dashboard'; render(); toast(t('toast.welcomeAdmin')); }
}
window.doLogin = doLogin;

// ---------- Shell ----------
function shell(path, content) {
  return `
  <div class="admin-shell">
    <aside class="admin-side">
      <a class="brand" href="#/dashboard">
        <span class="brand-logo">
          <img src="./assets/character-mascot.png" alt="DallyTrip" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';" />
          <span class="char-fallback" style="display:none;">💵</span>
        </span>
        <span>DallyTrip</span>
      </a>
      <nav class="mt-16">
        ${sideLink('/dashboard', t('admin.side.dashboard'), '📊', path)}
        ${sideLink('/products',  t('admin.side.products'),  '🛏️', path)}
        ${sideLink('/bookings',  t('admin.side.bookings'),  '📅', path)}
        ${sideLink('/payments',  t('admin.side.payments'),  '💳', path)}
        ${sideLink('/users',     t('admin.side.users'),     '👥', path)}
        ${sideLink('/banners',   t('admin.side.banners'),   '🖼️', path)}
        ${sideLink('/settings',  t('admin.side.settings'),  '⚙️', path)}
      </nav>
      <div style="flex:1;"></div>
      <div class="mt-16" data-dt-lang-mount></div>
      <div class="glass-card mt-8" style="padding:14px;">
        <div class="t-small t-muted">${t('admin.side.adminWallet')}</div>
        <div class="t-mono t-small" style="font-weight:700;">${store.settings.wallet}</div>
      </div>
      <button class="btn btn-ghost btn-sm mt-8" onclick="logout()">${t('btn.signout')}</button>
    </aside>
    <main class="admin-main">
      ${content}
    </main>
  </div>
  `;
}
function sideLink(p,l,e,cur){ return `<a href="#${p}" class="${cur===p?'is-active':''}"><span style="width:22px;display:inline-grid;place-items:center;">${e}</span>${l}</a>`; }
function logout(){ sessionStorage.removeItem('dt_admin'); store.loggedIn=false; location.hash='#/login'; render(); }
window.logout = logout;

// ---------- Dashboard ----------
function dashboardPage() {
  const today = store.bookings.length;
  const totalPay = store.payments.filter(p=>p.status==='Confirmed').reduce((s,p)=>s+p.amount,0);
  const pending = store.bookings.filter(b=>b.status==='Pending Confirmation').length;
  const users = store.users.length;

  return `
  <div class="page-enter">
    <div class="row space-between items-center mb-16">
      <div>
        <span class="kicker">${t('admin.dash.kicker')}</span>
        <h2 class="h2 mt-8">${t('admin.dash.title')}</h2>
      </div>
      <div class="row gap-12">
        <button class="btn btn-secondary btn-sm">${t('btn.export')}</button>
        <a class="btn btn-primary btn-sm" href="#/products/new">${t('btn.newProduct')}</a>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="stat-card">
        <div class="label">${t('admin.dash.today')}</div>
        <div class="num">${today}</div>
        <div class="bubble blue">${today}</div>
      </div>
      <div class="stat-card">
        <div class="label">${t('admin.dash.totalPay')}</div>
        <div class="num">${fmt(totalPay)} <span style="font-size:18px;color:var(--token-green);">$1</span></div>
        <div class="bubble green">$</div>
      </div>
      <div class="stat-card">
        <div class="label">${t('admin.dash.pending')}</div>
        <div class="num">${pending}</div>
        <div class="bubble orange">${pending}</div>
      </div>
      <div class="stat-card">
        <div class="label">${t('admin.dash.users')}</div>
        <div class="num">${users}</div>
        <div class="bubble purple">${users}</div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns: 2fr 1fr; gap:20px; margin-top:24px;">
      <div class="glass-card" style="padding:24px;">
        <div class="row space-between items-center">
          <h3 class="h3">${t('admin.dash.recent')}</h3>
          <a class="t-small" href="#/bookings" style="font-weight:700;color:var(--ocean-blue);">${t('admin.dash.viewAll')}</a>
        </div>
        <div class="mt-16">
          <table class="glass-table" style="border:0;">
            <thead><tr><th>${t('admin.dash.booking')}</th><th>${t('common.product')}</th><th>${t('common.amount')}</th><th>${t('common.status')}</th></tr></thead>
            <tbody>
              ${store.bookings.slice(0,5).map(b=>`
                <tr>
                  <td><b>${b.id}</b><div class="t-small t-muted t-mono">${b.wallet}</div></td>
                  <td>${b.product}<div class="t-small t-muted">${b.date}</div></td>
                  <td><b>${fmt(b.amount)} $1</b></td>
                  <td><span class="badge ${badgeForStatus(b.status)}">${t('status.'+b.status)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="glass-card" style="padding:24px;">
        <h3 class="h3">${t('admin.dash.topDest')}</h3>
        <div class="col mt-16 gap-12">
          ${['Da Nang','Phu Quoc','Nha Trang','Ho Chi Minh'].map((c,i)=>`
            <div class="row items-center space-between">
              <div class="row items-center gap-8">
                <span style="width:32px;height:32px;border-radius:10px;background:var(--grad-main-cta);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;">${c[0]}</span>
                <div><b>${trCity(c)}</b><div class="t-small t-muted">${4-i} ${t('admin.dash.bookings')}</div></div>
              </div>
              <div style="width:120px;height:8px;border-radius:999px;background:rgba(255,255,255,0.55);overflow:hidden;">
                <div style="height:100%;width:${[80,60,45,30][i]}%;background:var(--grad-main-cta);"></div>
              </div>
            </div>
          `).join('')}
        </div>

        <h3 class="h3 mt-24">${t('admin.dash.statusMix')}</h3>
        <div class="col mt-16 gap-8">
          ${['Confirmed','Pending Confirmation','Completed','Cancelled'].map(s=>{
            const n = store.bookings.filter(b=>b.status===s).length;
            return `<div class="row space-between"><span class="badge ${badgeForStatus(s)}">${t('status.'+s)}</span><b>${n}</b></div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>
  `;
}

// ---------- Products list ----------
function productsPage() {
  return `
  <div class="page-enter">
    <div class="row space-between items-center mb-16">
      <div>
        <span class="kicker">${t('admin.products.kicker')}</span>

      <a class="btn btn-primary" href="#/products/new">${t('btn.addProduct')}</a>

    <div class="glass-card" style="padding:16px;">

        <select class="glass-input" style="max-width:140px;"><option>${t('common.allStatus')}</option><option>${t('common.live')}</option><option>${t('common.hidden')}</option></select>
      </div>
    </div>

    <div class="mt-16" style="overflow-x:auto;">
      <table class="glass-table">
        <thead><tr>
          <th>${t('common.image')}</th><th>${t('common.product')}</th><th>${t('common.category')}</th><th>${t('common.city')}</th><th>${t('common.price')} $1</th><th>${t('common.status')}</th><th>${t('common.created')}</th><th>${t('common.actions')}</th>
        </tr></thead>
        <tbody>
          ${store.products.map(p=>`
            <tr>
              <td><div style="width:48px;height:48px;border-radius:12px;background:url('${p.img}') center/cover;"></div></td>
              <td><b>${p.name}</b>${p.featured?` <span class="badge purple">${t('admin.products.featured')}</span>`:''}</td>
              <td><span class="badge blue">${t('cat.'+p.cat)}</span></td>
              <td>${trCity(p.city)}</td>
              <td><b>${p.price}</b></td>
              <td><span class="badge ${badgeForStatus(p.status)}">${t('status.'+p.status)}</span></td>
              <td>${p.created}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="toggleProduct('${p.id}')">${p.status==='Live'?t('btn.hide'):t('btn.show')}</button>
                <button class="btn btn-ghost btn-sm" onclick="deleteProduct('${p.id}')">${t('btn.delete')}</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}
function toggleProduct(id){ const p = store.products.find(x=>x.id===id); p.status = p.status==='Live'?'Hidden':'Live'; persist(); toast(p.status==='Live'?t('toast.productLive'):t('toast.productHidden')); render(); }
function deleteProduct(id){ if(!confirm(t('admin.products.confirmDel'))) return; store.products = store.products.filter(x=>x.id!==id); persist(); toast(t('toast.productDeleted')); render(); }
window.toggleProduct = toggleProduct; window.deleteProduct = deleteProduct;

function toggleBanner(i){ store.banners[i].status = store.banners[i].status==='Live'?'Hidden':'Live'; persist(); render(); }
function deleteBanner(i){ if(!confirm(t('admin.bn.confirmDel'))) return; store.banners.splice(i,1); persist(); render(); }
function addBanner(real){
  if (!real) { document.getElementById('bn_title')?.focus(); return; }
  const b = {
    title: document.getElementById('bn_title').value,
    subtitle: document.getElementById('bn_sub').value,
    buttonText: document.getElementById('bn_btn').value,
    link: document.getElementById('bn_link').value,
    status: 'Live',
    order: store.banners.length + 1
  };
  store.banners.push(b); persist(); toast(t('toast.bannerAdded')); render();
}

// ================= Router =================
function render() {
  const root = document.getElementById('root');
  if (!store.loggedIn) {
    root.innerHTML = loginPage();
    if (window.__dtLang) window.__dtLang.mountSwitchers();
    return;
  }
  const hash = location.hash || '#/dashboard';
  const path = hash.replace(/^#/, '');
  let content = '';
  if (path === '/' || path === '/dashboard') content = dashboardPage();
  else if (path === '/products') content = productsPage();
  else if (path === '/products/new') content = productNewPage();
  else if (path === '/bookings') content = bookingsPage();
  else if (path === '/payments') content = paymentsPage();
  else if (path === '/users') content = usersPage();
  else if (path === '/banners') content = bannersPage();
  else if (path === '/settings') content = settingsPage();
  else content = '<div class="glass-card" style="padding:32px;">Page not found.</div>';
  root.innerHTML = shell(path, content);
  if (window.__dtLang) window.__dtLang.mountSwitchers();
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
window.addEventListener('dt:lang', render);
window.addEventListener('load', () => {
  if (store.loggedIn && (!location.hash || location.hash === '#/')) location.hash = '#/dashboard';
  render();
});
</script>
