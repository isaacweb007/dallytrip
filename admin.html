const fmt = n => Number(n).toLocaleString('en-US');
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){ const wrap=document.getElementById('toasts'); const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<span class="dot"></span><span>${escapeHtml(msg)}</span>`; wrap.appendChild(el); setTimeout(()=>el.style.opacity=0,2400); setTimeout(()=>el.remove(),2700); }

const STATUS_OPTIONS = ['Payment Completed','Pending Confirmation','Confirmed','Completed','Cancel Requested','Cancelled'];
function badgeForStatus(s){ return ({
  'Payment Completed':'status-paid',
  'Pending Confirmation':'status-pending',

  'Completed':'status-completed',

// Hard-coded demo credentials for the admin panel
const ADMIN_USER = 'admin';
const ADMIN_PASS = '123456';

function doLogin() {
  const id = (document.getElementById('loginEmail').value || '').trim();
  const pw = (document.getElementById('loginPw').value || '').trim();
  const err = document.getElementById('loginErr');
  if (id === ADMIN_USER && pw === ADMIN_PASS) {
    sessionStorage.setItem('dt_admin','1');
    store.loggedIn = true;
    location.hash = '#/dashboard';
    render();
    toast(t('toast.welcomeAdmin'));
  } else {
    if (err) {
      err.style.display = 'block';
      err.textContent = ({
        ko:'아이디 또는 비밀번호가 올바르지 않습니다.',
        en:'Invalid username or password.',
        ja:'IDまたはパスワードが正しくありません。',
        zh:'用户名或密码不正确。'
      })[window.__DT_LANG||'ko'] || 'Invalid username or password.';
    }
  }
}
window.doLogin = doLogin;

function dashboardPage() {

  const users = store.users.length;

  return `
  <div class="page-enter">
    <div class="row space-between items-center mb-16">
      <div>
        <span class="kicker">${t('admin.dash.kicker')}</span>
        <h2 class="h2 mt-8">${t('admin.dash.title')}</h2>
      </div>
      <div class="row gap-12">
        <button class="btn btn-secondary btn-sm">${t('btn.export')}</button>
        <a class="btn btn-primary btn-sm" href="#/products/new">${t('btn.newProduct')}</a>
      </div>

    <div class="grid grid-4">
      <div class="stat-card">
        <div class="label">${t('admin.dash.today')}</div>

      </div>
      <div class="stat-card">
        <div class="label">${t('admin.dash.pending')}</div>
        <div class="num">${pending}</div>
        <div class="bubble orange">${pending}</div>
      </div>
      <div class="stat-card">
        <div class="label">${t('admin.dash.users')}</div>
        <div class="num">${users}</div>
        <div class="bubble purple">${users}</div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns: 2fr 1fr; gap:20px; margin-top:24px;">
      <div class="glass-card" style="padding:24px;">
        <div class="row space-between items-center">
          <h3 class="h3">${t('admin.dash.recent')}</h3>
          <a class="t-small" href="#/bookings" style="font-weight:700;color:var(--ocean-blue);">${t('admin.dash.viewAll')}</a>
        </div>
        <div class="mt-16">
          <table class="glass-table" style="border:0;">

                  <td>${b.product}<div class="t-small t-muted">${b.date}</div></td>
                  <td><b>${fmt(b.amount)} $1</b></td>
                  <td><span class="badge ${badgeForStatus(b.status)}">${t('status.'+b.status)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="glass-card" style="padding:24px;">
        <h3 class="h3">${t('admin.dash.topDest')}</h3>
        <div class="col mt-16 gap-12">
          ${['Da Nang','Phu Quoc','Nha Trang','Ho Chi Minh'].map((c,i)=>`

window.toggleProduct = toggleProduct; window.deleteProduct = deleteProduct;

    name: document.getElementById('f_name').value,

    img: document.getElementById('f_img').value,

function deleteBanner(i){ if(!confirm(t('admin.bn.confirmDel'))) return; store.banners.splice(i,1); persist(); render(); }
function addBanner(real){
  if (!real) { document.getElementById('bn_title')?.focus(); return; }
  const b = {
    title: document.getElementById('bn_title').value,
    subtitle: document.getElementById('bn_sub').value,
    buttonText: document.getElementById('bn_btn').value,
    link: document.getElementById('bn_link').value,
    status: 'Live',
    order: store.banners.length + 1
  };
  store.banners.push(b); persist(); toast(t('toast.bannerAdded')); render();
}
window.toggleBanner = toggleBanner; window.deleteBanner = deleteBanner; window.addBanner = addBanner;

// Drain user-app pending orders into our payouts queue (real-time bridge)
function drainUserOrders() {
  try {
    const incoming = JSON.parse(localStorage.getItem('dt_pending_orders') || '[]');
    if (!incoming.length) return 0;
    const existingIds = new Set(store.payouts.map(p => p.id));
    let added = 0;
    incoming.forEach(o => {
      if (!existingIds.has(o.id)) {
        store.payouts.unshift(o);
        added++;
      }
    });
    if (added) persist();
    return added;
  } catch { return 0; }
}
// Run every time admin loads + every 5s while page is open
setInterval(() => {
  const n = drainUserOrders();
  if (n && store.loggedIn) {
    const cur = location.hash.replace(/^#/, '');
    if (cur === '/payouts' || cur === '/dashboard' || cur === '/bookings') render();
    toast(`+${n} new pending order${n>1?'s':''}`);
  }
}, 5000);
drainUserOrders();

async function runHealthCheck() {
  store.envFlags = { byPath: {}, healthy: 0, notConfigured: 0 };
  toast('⚡ Running health check…');
  for (const e of API_ENDPOINTS) {
    let url = e.path;
    if (e.path === '/api/hotels/search') url += '?city=Da+Nang';
    else if (e.path === '/api/activities/search') url += '?city=Da+Nang';
    else if (e.path === '/api/cars/search') url += '?city=Da+Nang';
    else if (e.path === '/api/flights/search') url += '?from=SGN&to=BKK';
    else if (e.path === '/api/booking/search') url += '?city=Da+Nang';
    else if (e.path === '/api/tp/search') url += '?type=activities&city=Da+Nang';
    try {
      const r = await fetch(url, { headers:{ 'Accept':'application/json' } });
      const j = await r.json();
      const status = r.ok ? 'healthy' : 'error';
      store.envFlags.byPath[e.path] = { status, when: new Date().toLocaleTimeString(), count: j.count || 0 };
      if (status === 'healthy') store.envFlags.healthy++;
    } catch (err) {
      store.envFlags.byPath[e.path] = { status:'error', when:new Date().toLocaleTimeString(), count:0 };
      store.envFlags.notConfigured++;
    }
  }
  render();
  toast('Health check complete');
}
window.runHealthCheck = runHealthCheck;

  }
  const hash = location.hash || '#/dashboard';
  const path = hash.replace(/^#/, '');
  let content = '';
  if (path === '/' || path === '/dashboard') content = dashboardPage();
  else if (path === '/products') content = productsPage();
  else if (path === '/products/new') content = productNewPage();
  else if (path === '/bookings') content = bookingsPage();
  else if (path === '/payments') content = paymentsPage();
  else if (path === '/users') content = usersPage();
  else if (path === '/banners') content = bannersPage();
  else if (path === '/settings') content = settingsPage();
  else if (path === '/api') content = apiPage();
  else if (path === '/partners') content = partnersPage();
  else if (path === '/wallet') content = walletPage();
  else if (path === '/payouts') content = payoutsPage();
  else content = '<div class="glass-card" style="padding:32px;">Page not found.</div>';
  root.innerHTML = shell(path, content);
  if (window.__dtLang) window.__dtLang.mountSwitchers();
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
window.addEventListener('dt:lang', render);
window.addEventListener('load', () => {
  if (store.loggedIn && (!location.hash || location.hash === '#/')) location.hash = '#/dashboard';
  render();
});
</script>

</body>
</html>
