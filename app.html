// Use this everywhere a product field could be either a string (legacy / API
// passthrough) or a localized object. Falls back: current → en → ko → first.
function tField(v) {
  if (v == null) return '';
  if (typeof v === 'string' || typeof v === 'number') return v;
  if (Array.isArray(v)) return v.map(tField);
  const lang = window.__dtLang ? window.__dtLang.getLang() : 'en';
  return v[lang] || v.en || v.ko || v[Object.keys(v)[0]] || '';
}

// ================= Travelpayouts deeplink helpers =================
// All affiliate redirects flow through here so commission is always tracked.
// Marker is appended server-side too (functions/api/_lib.js), this is a safety net
// for hard-coded links built on the client.
const TP_MARKER = '732326';                    // API marker
const TP_TRS    = '532633';                    // tracking script marker
const tpAttachMarker = (urlStr, subId) => {
  try {
    const u = new URL(urlStr);
    if (!u.searchParams.has('marker')) u.searchParams.set('marker', TP_MARKER);
    if (subId) u.searchParams.set('sub_id', subId);
    return u.toString();
  } catch { return urlStr; }
};
const tpDeeplink = (kind, params = {}) => {
  switch (kind) {
    case 'flight': {
      const { from='ICN', to='DAD', date='', adults=1, subId='' } = params;
      let dc = '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(date)) { const [, m, d] = date.split('-'); dc = d + m; }
      return tpAttachMarker(`https://www.aviasales.com/search/${from}${dc}${to}${adults}`, subId);
    }
    case 'hotel': {
      const { city='Da Nang', checkin='', checkout='', adults=2, subId='' } = params;
      const q = `https://search.hotellook.com/hotels?destination=${encodeURIComponent(city)}` +
        (checkin?`&checkIn=${checkin}`:'') + (checkout?`&checkOut=${checkout}`:'') + `&adults=${adults}`;
      return tpAttachMarker(q, subId);
    }
    case 'car': {
      const { city='Da Nang', pickup='', dropoff='', subId='' } = params;
      const u = `https://www.discovercars.com/?a_aid=${TP_MARKER}&country=any&location=${encodeURIComponent(city)}` +
        (pickup?`&pickupdate=${pickup}`:'') + (dropoff?`&dropoffdate=${dropoff}`:'');
      return u + (subId?`&sub_id=${encodeURIComponent(subId)}`:'');
    }
    case 'activity': {
      const { city='Da Nang', q='', subId='' } = params;
      const slug = (q || city).replace(/\s+/g,'-').toLowerCase();
      return `https://www.getyourguide.com/s/?q=${encodeURIComponent(q || city)}&partner_id=${TP_MARKER}&sub_id=${encodeURIComponent(subId || slug)}`;
    }
    default:
      return tpAttachMarker(`https://www.aviasales.com/?sub_id=${subId||''}`);
  }
};
window.tpDeeplink = tpDeeplink;

// Pick city image by stable index (hash of name) → same name always same photo
function cityImg(city, name) {
  const pool = CITY_IMG_POOL[city] || [LIVE_IMG.hotel];
  if (pool.length === 1 || !name) return pool[0];
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return pool[Math.abs(h) % pool.length];
}

async function fetchJsonSafe(url) {
  try {
    const r = await fetch(url, { headers:{ 'Accept':'application/json' } });
    if (!r.ok) return null;
    const ct = r.headers.get('content-type') || '';
    if (!ct.includes('json')) return null;
    return await r.json();
  } catch { return null; }
}

  const hotelName = h.name || `${cityName} Hotel`;

    || (h.hotelId
          ? `https://photo.hotellook.com/image_v2/limit/h${h.hotelId}_1/800/520.auto`

// Parse ISO 8601 duration (e.g. "PT5H30M") → "5h 30m"
function parseISODuration(dur) {
  if (!dur) return '';
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return dur;
  const h = parseInt(m[1] || '0', 10);
  const min = parseInt(m[2] || '0', 10);
  if (h && min) return `${h}h ${min}m`;
  if (h) return `${h}h`;
  return `${min}m`;
}

function normalizeFlight(f) {
  const isDuffel = f.provider === 'duffel';
  const toAirport = f.to || 'DAD';
  const cityFromAirport = AIRPORT_TO_CITY[toAirport] || toAirport;
  const durationStr = isDuffel ? parseISODuration(f.duration) : (f.duration || '');
  const airlineDisplay = (isDuffel ? f.airlineName : f.airline) || f.airline || 'Multiple';
  // Baggage info comes from Duffel already as a string; default per-locale otherwise.
  const baggageIncl = isDuffel && f.baggageInfo
    ? f.baggageInfo
    : { ko:'기내 수하물 1개', en:'1 carry-on bag', ja:'機内持ち込み手荷物1個', zh:'1件随身行李' };

  // Flight hero: prefer airline logo (server-provided) over generic stock airplane.
  // Card / detail page will still fall back to LIVE_IMG.flight via background-image
  // chaining, but a per-flight visual ties the card to *this* flight.
  return {
    id: `live_f_${f.id || f.flightNumber || Math.random().toString(36).slice(2,8)}`,
    source: 'live',
    provider: f.provider || 'travelpayouts',
    cat: 'Flight',
    country: COUNTRY_OF_CITY[cityFromAirport] || 'Vietnam',
    city: cityFromAirport,
    // route + airline reads correctly in any locale, just keep raw codes
    name: `${f.from} → ${f.to}${airlineDisplay !== 'Multiple' ? ' · ' + airlineDisplay : ''}`,
    fromCode: f.from, toCode: f.to,
    fromCity: AIRPORT_TO_CITY[f.from] || f.from,
    toCity: cityFromAirport,
    airline: airlineDisplay,
    airlineLogo: f.airlineLogo || null,
    flightNo: f.flightNumber || f.flightNo || '',
    depart: f.departTime || f.depart || '',
    arrive: f.arriveTime || '',
    duration: durationStr,
    stops: f.stops || 0,
    cabin: 'Economy',
    baggageInfo: baggageIncl,
    offerId: f.offerId || null,
    priceUSD: Number(f.price || 0),
    price: usdToToken(f.price || 0),
    rating: 4.6, reviews: Math.floor(80 + Math.random() * 600),
    img: f.image || cityImg(cityFromAirport, `${f.from}-${f.to}`) || LIVE_IMG.flight,
    imgFallback: LIVE_IMG.flight,
    desc: isDuffel
      ? {
          ko: `${f.from}에서 ${f.to}행 실시간 항공편. ${airlineDisplay}.`,
          en: `Live flight ${f.from} → ${f.to} operated by ${airlineDisplay}.`,
          ja: `${f.from}発${f.to}行きライブフライト。${airlineDisplay}運航。`,
          zh: `${f.from}飞往${f.to}的实时航班。由${airlineDisplay}运营。`,
        }
      : {
          ko: `${f.from}에서 ${f.to}행 항공편. 아비아세일즈 제공 최저가.`,
          en: `Flight ${f.from} → ${f.to}. Lowest fare via Aviasales.`,
          ja: `${f.from}発${f.to}行きフライト。Aviasalesの最安値。`,
          zh: `${f.from}飞往${f.to}的航班。Aviasales提供最低价。`,
        },
    included: {
      ko: [typeof baggageIncl === 'string' ? baggageIncl : baggageIncl.ko, '온라인 체크인'],
      en: [typeof baggageIncl === 'string' ? baggageIncl : baggageIncl.en, 'Online check-in'],
      ja: [typeof baggageIncl === 'string' ? baggageIncl : baggageIncl.ja, 'オンラインチェックイン'],
      zh: [typeof baggageIncl === 'string' ? baggageIncl : baggageIncl.zh, '在线值机'],
    },
    excluded: isDuffel && f.baggageInfo
      ? { ko:[], en:[], ja:[], zh:[] }
      : {
          ko: ['위탁 수하물 (항공사별 상이)', '식사'],
          en: ['Checked bag (airline-dependent)', 'Meals'],
          ja: ['受託手荷物（航空会社による）', '機内食'],
          zh: ['托运行李（视航空公司而定）', '餐食'],

  SGN:'Ho Chi Minh', HAN:'Hanoi', DAD:'Da Nang', PQC:'Phu Quoc', CXR:'Nha Trang',
  BKK:'Bangkok', HKT:'Phuket', CNX:'Chiang Mai',

  NRT:'Tokyo', HND:'Tokyo', KIX:'Osaka', ITM:'Osaka', UKB:'Kyoto',
  PVG:'Shanghai', SHA:'Shanghai', PEK:'Beijing', PKX:'Beijing', HKG:'Hong Kong',
  KUL:'Kuala Lumpur', PEN:'Penang',
  SIN:'Singapore',
};

async function loadLiveCatalog() {
  // 25+ cities across 9 Asian countries
  const cities = [
    // Vietnam
    'Da Nang', 'Phu Quoc', 'Nha Trang', 'Ho Chi Minh', 'Hanoi',
    // Thailand
    'Bangkok', 'Phuket', 'Chiang Mai',
    // Indonesia
    'Bali', 'Jakarta',
    // Philippines
    'Manila', 'Cebu', 'Boracay',
    // Korea
    'Seoul', 'Busan', 'Jeju',
    // Japan
    'Tokyo', 'Osaka', 'Kyoto',
    // China / HK
    'Shanghai', 'Beijing', 'Hong Kong',
    // Malaysia
    'Kuala Lumpur', 'Penang',
    // Singapore
    'Singapore',
  ];
  const routes = [
    // From Korea
    { from:'ICN', to:'DAD' }, { from:'ICN', to:'BKK' }, { from:'ICN', to:'CGK' },
    { from:'ICN', to:'KIX' }, { from:'ICN', to:'SIN' }, { from:'ICN', to:'MNL' },
    // From Japan
    { from:'NRT', to:'SGN' }, { from:'NRT', to:'BKK' }, { from:'NRT', to:'DPS' },
    { from:'KIX', to:'KUL' }, { from:'KIX', to:'TPE' },
    // SEA internal
    { from:'SGN', to:'BKK' }, { from:'BKK', to:'PQC' }, { from:'BKK', to:'DPS' },
    { from:'BKK', to:'CGK' }, { from:'KUL', to:'SIN' }, { from:'SIN', to:'DPS' },
    { from:'MNL', to:'CEB' }, { from:'MNL', to:'NRT' },
    // China
    { from:'PVG', to:'BKK' }, { from:'PEK', to:'ICN' }, { from:'HKG', to:'BKK' },
  ];

  // Fan-out fetches in parallel; each catches its own failure
  const hotelReqs = cities.map(c =>
    fetchJsonSafe(`/api/hotels/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const carReqs = cities.map(c =>
    fetchJsonSafe(`/api/cars/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const actReqs = cities.map(c =>
    fetchJsonSafe(`/api/activities/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const flightReqs = routes.map(rt =>
    fetchJsonSafe(`/api/flights/search?from=${rt.from}&to=${rt.to}`).then(r => ({...rt, r})));

  const [hotels, cars, acts, flights] = await Promise.all([
    Promise.all(hotelReqs),
    Promise.all(carReqs),
    Promise.all(actReqs),
    Promise.all(flightReqs),
  ]);

  const live = [];
  hotels.forEach(({city, r}) => (r?.results || []).forEach(h => live.push(normalizeHotel(h, city))));
  cars.forEach(({city, r})   => (r?.results || []).forEach(c => live.push(normalizeCar(c, city))));
  acts.forEach(({city, r})   => (r?.results || []).forEach(a => live.push(normalizeActivity(a))));
  flights.forEach(({r})      => (r?.results || []).forEach(f => live.push(normalizeFlight(f))));

  state.liveProducts = live;
  state.liveByCity = live.reduce((acc, p) => { acc[p.city] = (acc[p.city]||0)+1; return acc; }, {});
  state.liveLoaded = true;

  // Update external price averages for compare badges
  hotels.forEach(({city, r}) => refreshExtAvgFromExternal('hotels', r?.results || []));
  cars.forEach(({city, r})   => refreshExtAvgFromExternal('cars', r?.results || []));
  acts.forEach(({city, r})   => refreshExtAvgFromExternal('activities', r?.results || []));
  flights.forEach(({r})      => refreshExtAvgFromExternal('flights', r?.results || []));

  // Re-render current view if it depends on live data
  if (typeof router === 'function') router();
  return live;
}
window.loadLiveCatalog = loadLiveCatalog;

const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="dot"></span><span>${escapeHtml(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = 0; el.style.transform = 'translateY(8px)'; el.style.transition = 'all 220ms ease-out'; }, 2400);
  setTimeout(() => el.remove(), 2700);
}

// Refresh external average prices after live API returns, then re-render cards in place.
function refreshExtAvgFromExternal(type, results) {
  if (!Array.isArray(results) || results.length === 0) return;
  // Average USD price per city, scoped to this category
  const byCity = {};
  results.forEach(r => {
    const city = r.location || r.city || r.to || '';
    const price = parseFloat(r.price);
    if (!city || !price) return;
    byCity[city] = byCity[city] || { sum: 0, n: 0 };
    byCity[city].sum += price;
    byCity[city].n += 1;
  });
  const catMap = { flights:'Flight', hotels:'Hotel', cars:'Transport', activities:'Activity' };
  const cat = catMap[type];
  if (!cat) return;
  Object.entries(byCity).forEach(([city, { sum, n }]) => {
    // Store as $1 tokens (external is in USD, divide by FX_RATE)
    state.extAvg[`${cat}|${city}`] = usdToToken(sum / n);
  });
}

function pageSearch(params) {
  const cat  = params.get('cat') || state.filter.category || 'All';
  const q    = (params.get('q') || state.filter.q || '').toLowerCase();
  // Pre-populate flight params from URL (e.g. from landing search form)
  const urlFrom  = params.get('from') || 'ICN';
  const urlTo    = params.get('to')   || 'SGN';
  const urlDate  = params.get('date') || '';
  const urlAdult = params.get('adults') || '1';
  state.filter = { category: cat, q };

  const filtered = getCatalog().filter(p => {
    const matchCat = cat === 'All'
      || (cat === 'Hotels'     && p.cat === 'Hotel')
      || (cat === 'Tours'      && p.cat === 'Tour')
      || (cat === 'Activities' && p.cat === 'Activity')
      || (cat === 'Flights'    && p.cat === 'Flight')
      || (cat === 'Transport'  && (p.cat === 'Transport' || p.cat === 'Pickup'));
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.city.toLowerCase().includes(q) || p.country.toLowerCase().includes(q);

// ============== External (Travelpayouts) results loader ==============
async function loadExternalResults() {
  const host = document.getElementById('externalResults');
  if (!host) return;
  const cat = host.dataset.cat || 'All';
  const q   = host.dataset.q || '';

  // Map our category → tp type
  const typeMap = {
    'All':'flights', 'Flights':'flights', 'Hotels':'hotels',
    'Tours':'activities', 'Activities':'activities', 'Transport':'cars'
  };
  const type = typeMap[cat] || 'activities';
  const city = q || (cat === 'Flights' ? '' : 'Da Nang');

  // Build query for the unified endpoint
  const u = new URL(location.origin + '/api/tp/search');
  u.searchParams.set('type', type);
  if (type === 'hotels')     { u.searchParams.set('city', city); }
  else if (type === 'cars')  { u.searchParams.set('city', city); }
  else if (type === 'activities') { u.searchParams.set('city', city); }
  else if (type === 'flights') {
    // Read values from search form if available, else use smart defaults
    const fromEl   = document.getElementById('s_from');
    const toEl     = document.getElementById('s_to');
    const dateEl   = document.getElementById('s_date');
    const adultsEl = document.getElementById('s_adults');
    const fromCode = fromEl?.value?.trim().toUpperCase() || host.dataset.from || 'ICN';
    const toCode   = toEl?.value?.trim().toUpperCase()   || host.dataset.to   || 'SGN';
    const dateVal  = dateEl?.value || host.dataset.date || '';
    const adultsVal= adultsEl?.value || '1';
    u.searchParams.set('from', fromCode);
    u.searchParams.set('to',   toCode);
    if (dateVal) u.searchParams.set('date', dateVal);
    u.searchParams.set('adults', adultsVal);
  }

  // Loading skeleton
  host.innerHTML = `
    <div class="row space-between items-center mb-16">
      <h3 class="h3">🌐 ${t('app.search.partnerHeading')}</h3>
      <span class="badge purple">${t('app.search.partnerCommission')}</span>
    </div>
    <div class="grid grid-3">
      ${Array.from({length:3}).map(()=>`
        <div class="glass-card" style="padding:18px;">
          <div class="shimmer" style="height:140px; border-radius:16px;"></div>
          <div class="shimmer mt-16" style="height:14px; width:60%; border-radius:6px;"></div>
          <div class="shimmer mt-8" style="height:14px; width:40%; border-radius:6px;"></div>
        </div>`).join('')}
    </div>`;

  let data;
  try {
    const r = await fetch(u.toString(), { headers: { 'Accept':'application/json' } });
    data = await r.json();
  } catch (e) {
    host.innerHTML = `<div class="glass-card" style="padding:20px;">⚠ Partner search unavailable. (${e.message})</div>`;
    return;
  }

  const results = (data && data.results) || [];

  // Refresh price-comparison averages, then re-render any visible internal cards
  refreshExtAvgFromExternal(type, results);
  document.querySelectorAll('a.product-card[href^="#/product/"]').forEach(card => {
    const id = (card.getAttribute('href') || '').split('/')[2];
    const p = PRODUCTS.find(x => x.id === id);
    if (p) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = productCard(p);
      const fresh = wrapper.firstElementChild;
      if (fresh) card.replaceWith(fresh);
    }
  });

  if (results.length === 0) {
    host.innerHTML = `
      <div class="row space-between items-center mb-16">
        <h3 class="h3">🌐 ${t('app.search.partnerHeading')}</h3>
      </div>
      <div class="glass-card" style="padding:24px;">
        <div class="t-muted">${t('app.search.partnerEmpty')}</div>
      </div>`;
    return;
  }

  host.innerHTML = `
    <div class="row space-between items-center mb-16" style="flex-wrap:wrap;gap:8px;">
      <h3 class="h3">🌐 ${t('app.search.partnerHeading')} <span class="t-small t-muted" style="font-weight:600;">· ${results.length} ${t('common.results').trim()}</span></h3>
      <span class="badge purple">${t('app.search.partnerCommission')}</span>
    </div>
    <div class="grid grid-3">
      ${results.map(r => externalCard(r, type)).join('')}
    </div>
  `;
}

function externalCard(r, type) {
  // Duffel flights: special rich card
  if (type === 'flights' && r.provider === 'duffel') {
    return duffelFlightCard(r);
  }

  // Normalize fields for display. Prefer the per-item image our server now sends
  // (hotels: Hotellook CDN, activities: keyword-matched, cars: type-matched).
  // Fall back to the city pool, then to the category default.
  let title, sub, img;
  const cityForFallback = r.city || r.location || r.to || '';
  if (type === 'flights') {
    title = `${r.from} → ${r.to}`;
    sub = `${r.airline||'Multiple'} · ${r.depart||''}`;
    img = r.image || cityImg(AIRPORT_TO_CITY[r.to] || cityForFallback, `${r.from}-${r.to}`) || LIVE_IMG.flight;
  } else if (type === 'hotels') {
    title = r.name || 'Hotel';
    sub = `${r.stars?'⭐'.repeat(Math.round(r.stars))+' · ':''}${r.location||''}`;
    img = r.image
      || (r.hotelId ? `https://photo.hotellook.com/image_v2/limit/h${r.hotelId}_1/800/520.auto` : null)
      || cityImg(cityForFallback, title)
      || LIVE_IMG.hotel;
  } else if (type === 'cars') {
    title = `${r.type} · ${r.model}`;
    sub = `${r.supplier} · ${r.seats} seats · ${r.transmission}`;
    img = r.image || cityImg(cityForFallback, r.model || r.type) || LIVE_IMG.car;
  } else {
    title = r.name || 'Activity';
    sub = `⭐ ${r.rating||'-'} · ${r.reviews||0} reviews`;
    img = r.image || cityImg(cityForFallback, title) || LIVE_IMG.activity;
  }
  const fallback = cityImg(cityForFallback, title) || LIVE_IMG[type === 'flights' ? 'flight' : (type === 'hotels' ? 'hotel' : (type === 'cars' ? 'car' : 'activity'))];
  const usd = r.price ? `$${fmt(r.price)}` : '—';
  return `
    <a class="product-card" href="${escapeHtml(r.bookingUrl||'#')}" target="_blank" rel="nofollow sponsored noopener">
      <div class="img" style="background-image:url('${img}'),url('${fallback}')">
        <span class="badge badge-on-image" style="background:linear-gradient(135deg,#E0D7FF,#C5B5FF);color:#4830b0;">🌐 External</span>
      </div>
      <div class="body">
        <div class="loc">via ${escapeHtml(({flights:'Aviasales',hotels:'Hotellook',cars:'DiscoverCars',activities:'GetYourGuide'})[type])}</div>
        <div class="title">${escapeHtml(title)}</div>
        <div class="meta">${escapeHtml(sub)}</div>
        <div class="price-row">
          <div><span style="font-size:20px;font-weight:800;color:var(--text-main);">${usd}</span> <span class="t-small t-muted">USD</span></div>
          <span class="btn btn-secondary btn-sm">${t('btn.book')}</span>
        </div>
      </div>
    </a>
  `;
}

// ── Duffel 전용 항공 카드 (실시간 재고, 항공사 로고, 수하물 정보) ─────────
function duffelFlightCard(r) {
  const usd   = r.price ? `$${fmt(r.price)}` : '—';
  const lang  = window.__dtLang ? window.__dtLang.getLang() : 'en';
  const L = {
    direct:  { ko:'직항', en:'Nonstop', ja:'直行', zh:'直飞' },
    stops:   { ko:'회 경유', en:' stop(s)', ja:'回乗継', zh:'次中转' },
    book:    { ko:'예약하기', en:'Book', ja:'予約する', zh:'预订' },
  };
  const stops = (r.transfers === 0 || r.stops === 0)
    ? L.direct[lang]
    : `${r.stops||r.transfers}${L.stops[lang]}`;
  const dur   = r.duration ? ` · ${r.duration}` : '';

  // Hero image: airline logo if available (the most "this is YOUR airline"
  // visual), else city image of the destination, else stock plane.
  const destCity = AIRPORT_TO_CITY[r.to] || '';
  const heroImg = r.airlineLogo
    || cityImg(destCity, `${r.from}-${r.to}`)
    || LIVE_IMG.flight;
  const heroBg = r.airlineLogo
    // Airline logo over a soft gradient — keep the logo readable and centered.
    ? `background:linear-gradient(135deg,#EAF6FF,#F4F8FF) center/cover; background-image:url('${escapeHtml(r.airlineLogo)}'),linear-gradient(135deg,#EAF6FF,#F4F8FF); background-repeat:no-repeat; background-position:center; background-size:contain, cover;`
    : `background-image:url('${heroImg}'),url('${LIVE_IMG.flight}'); background-size:cover; background-position:center;`;

  const logoHtml = r.airlineLogo
    ? `<img src="${escapeHtml(r.airlineLogo)}" alt="" style="height:22px;width:auto;object-fit:contain;border-radius:4px;">`
    : `<span style="font-size:13px;font-weight:700;color:var(--text-main);">${escapeHtml(r.airline||'')}</span>`;

  return `
    <div class="product-card" style="cursor:pointer;" onclick="location.hash='/product/'+${JSON.stringify(r.id||'')}"
         data-offer="${escapeHtml(r.offerId||'')}">
      <div class="img" style="${heroBg}">
        <span class="badge badge-on-image" style="background:rgba(255,255,255,0.92);color:#16a34a;font-weight:700;">✈ Duffel Live</span>
      </div>
      <div class="body">
        <!-- Route row -->
        <div class="row items-center space-between" style="margin-bottom:8px;">
          ${logoHtml}
          <span class="badge" style="background:#F0FFF4;color:#15803d;font-size:11px;">${stops}${dur}</span>
        </div>
        <div class="row items-center gap-8" style="font-size:15px;font-weight:800;letter-spacing:-0.01em;">
          <span>${escapeHtml(r.from||'')}</span>
          <span style="color:var(--ocean-blue);font-size:18px;">→</span>
          <span>${escapeHtml(r.to||'')}</span>
          ${r.depart ? `<span class="t-muted t-small">${escapeHtml(r.depart)}</span>` : ''}
          ${r.arrive ? `<span class="t-muted" style="font-size:11px;">→ ${escapeHtml(r.arrive)}</span>` : ''}
        </div>
        ${r.baggageInfo ? `<div class="t-small t-muted" style="margin-top:4px;">🧳 ${escapeHtml(r.baggageInfo)}</div>` : ''}
        <div class="price-row" style="margin-top:10px;">
          <div><span style="font-size:20px;font-weight:800;color:var(--text-main);">${usd}</span> <span class="t-small t-muted">USD</span></div>
          <span class="btn btn-primary btn-sm">${L.book[lang]}</span>
        </div>
      </div>
    </div>`;
}

// $1 token payment is COMING SOON. For now we surface a Coming-Soon modal +
// the affiliate booking link. We ALSO drop a pending order into shared storage
// so the admin Payouts queue can preview the full flow.
function proceedCheckout(productId) {
  const p = (typeof getCatalog === 'function' ? getCatalog() : PRODUCTS).find(x => x.id === productId);
  if (!p) return;
  // Stage a "pending order" — admin's Payouts queue will pick this up
  try {
    const orders = JSON.parse(localStorage.getItem('dt_pending_orders') || '[]');
    const wallet = state.wallet?.address || (state.user?.email || 'guest');
    orders.unshift({
      id: 'po_' + Date.now().toString(36),
      bookingId: 'DT' + Math.floor(100000 + Math.random()*900000),
      user: wallet,
      product: p.name, partner: p.source === 'live' ? 'Travelpayouts' : 'DallyTrip Direct',
      received: Number(p.price || 0),
      toPay: Number((p.priceUSD || p.price * 3) || 0),
      currency: 'USD', method: 'manual', status: 'queued',
      createdAt: new Date().toISOString().replace('T',' ').slice(0,16),
      productId, city: p.city, country: p.country, img: p.img
    });
    localStorage.setItem('dt_pending_orders', JSON.stringify(orders.slice(0, 50)));
  } catch {}
  showPaymentSoonModal(p);
}

function showPaymentSoonModal(p) {
  const isFlight = p.cat === 'Flight';

  if (!partnerUrl) {
    if (isFlight)         partnerUrl = tpDeeplink('flight',   { from:p.fromCode, to:p.toCode, date:'2026-06-12', adults:2, subId:sub });
    else if (isHotel)     partnerUrl = tpDeeplink('hotel',    { city:p.city, checkin:'2026-06-12', checkout:'2026-06-14', adults:2, subId:sub });

    close:   { ko:'닫기', en:'Close', ja:'閉じる', zh:'关闭' },
    notify:  { ko:'오픈 시 알림 받기', en:'Notify me on launch', ja:'公開時に通知', zh:'上线时通知我' },
  };
  const modal = document.createElement('div');
  modal.className = 'dt-modal-backdrop';
  modal.innerHTML = `
    <div class="dt-modal glass-card" role="dialog" aria-modal="true">
      <button class="dt-modal-close" onclick="this.closest('.dt-modal-backdrop').remove()" aria-label="Close">×</button>
      <div style="font-size:48px;text-align:center;line-height:1;">🪙</div>

          <div style="width:56px;height:56px;border-radius:14px;background:url('${p.img}') center/cover; flex-shrink:0;"></div>

        </div>
      </div>
      <a class="btn btn-primary btn-block btn-lg mt-16" href="${escapeHtml(partnerUrl)}" target="_blank" rel="nofollow sponsored noopener" onclick="setTimeout(()=>this.closest('.dt-modal-backdrop').remove(), 400)">
        🌐 ${L.partner[lang] || L.partner.en} →
      </a>
      <button class="btn btn-ghost btn-block mt-8" onclick="dtNotifyMe('${p.id}')">${L.notify[lang] || L.notify.en}</button>
      <button class="btn btn-ghost btn-block mt-8" onclick="this.closest('.dt-modal-backdrop').remove()">${L.close[lang] || L.close.en}</button>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}
window.showPaymentSoonModal = showPaymentSoonModal;

function dtNotifyMe(productId) {
  const subs = JSON.parse(localStorage.getItem('dt_notify') || '[]');
  if (!subs.includes(productId)) {
    subs.push(productId);
    localStorage.setItem('dt_notify', JSON.stringify(subs));
  }
  toast(({ ko:'$1 결제 오픈 시 알려드릴게요', en:'We\'ll notify you on launch', ja:'公開時に通知します', zh:'上线时会通知您' })[window.__DT_LANG||'ko'] || 'Notify saved');
  document.querySelector('.dt-modal-backdrop')?.remove();
}
window.dtNotifyMe = dtNotifyMe;
window.proceedCheckout = proceedCheckout;
window.connectWallet = connectWallet;
window.disconnectWallet = disconnectWallet;

function confirmPayment() {
  if (!state.wallet || !state.cart) return;
  toast(t('toast.waitingWallet'));
  setTimeout(() => toast(t('toast.txPending')), 600);
  setTimeout(() => {
    const id = 'DT' + Math.floor(100000 + Math.random()*900000);
    const tx = 'EQ' + Math.random().toString(36).slice(2,10).toUpperCase();
    state.bookings.unshift({
      id,
      product: state.cart.product,
      amount: state.cart.total,
      units: state.cart.units,
      date: state.cart.date,
      status: 'Pending Confirmation',
      tx,
      createdAt: new Date().toISOString().slice(0,10)
    });
    state.wallet.balance -= state.cart.total;
    state.cart = null;
    saveState();
    renderTopRight();
    toast(t('toast.paymentConfirmed'));
    setTimeout(() => { location.hash = '#/booking-success/' + id; }, 600);
  }, 1300);
}
window.confirmPayment = confirmPayment;

function onSearchSubmit() {
  const v = document.getElementById('searchInput').value.trim();
  location.hash = '#/search?q=' + encodeURIComponent(v) + (state.filter.category!=='All' ? '&cat='+encodeURIComponent(state.filter.category):'');
}
window.onSearchSubmit = onSearchSubmit;

// ================= Router =================
function router() {
  const hash = location.hash || '#/';
  const [path, qs] = hash.replace(/^#/, '').split('?');
  const params = new URLSearchParams(qs || '');
  const view = document.getElementById('view');
  let html = '';
  if (path === '/' || path === '') html = pageHome();
  else if (path === '/search') html = pageSearch(params);
  else if (path.startsWith('/product/')) html = pageProduct(path.split('/')[2]);
  else if (path === '/checkout') html = pageCheckout();
  else if (path.startsWith('/booking-success/')) html = pageBookingSuccess(path.split('/')[2]);
  else if (path === '/bookings') html = pageBookings();
  else if (path === '/wallet') html = pageWallet();
  else if (path === '/profile') html = pageProfile();
  else html = `<div class="glass-card" style="padding:32px;">Page not found.</div>`;
  view.innerHTML = html;
  renderBottomNav();
  bindProductTotals();
  window.scrollTo({ top: 0, behavior: 'instant' });
  // After the page is in the DOM, fetch live partner results (if any)
  if (document.getElementById('externalResults')) {
    setTimeout(() => loadExternalResults(), 30);
  }
}

function bindProductTotals() {
  const adults = document.getElementById('b_adults');
  const totalEl = document.getElementById('b_total');
  const unitsEl = document.getElementById('b_units');
  if (!adults || !totalEl) return;
  const path = (location.hash||'').replace(/^#/, '').split('?')[0];
  const id = path.split('/')[2];
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const opt = document.getElementById('b_option');
  const recompute = () => {
    const n = parseInt(adults.value || '1');
    let extra = 0;
    if (opt) {
      const v = opt.value;
      const m = v.match(/\+(\d+)/);
      if (m) extra = parseInt(m[1]);
    }
    totalEl.innerHTML = price((p.price + extra) * n);
    if (unitsEl) unitsEl.textContent = `x ${n}`;
  };
  adults.addEventListener('change', recompute);
  if (opt) opt.addEventListener('change', recompute);
}

window.addEventListener('hashchange', router);
window.addEventListener('dt:lang', () => { renderTopRight(); router(); });
window.addEventListener('load', () => {
  renderTopRight();
  router();
  // Fire-and-forget live catalog load — re-renders when done
  loadLiveCatalog();
});

// Unified getter: prefers live catalog, falls back to local mock
function getCatalog() {
  return state.liveLoaded && state.liveProducts.length > 0
    ? [...state.liveProducts, ...PRODUCTS]
    : PRODUCTS;
}
window.getCatalog = getCatalog;
</script>

</body>
</html>
