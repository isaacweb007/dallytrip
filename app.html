// tField — backward-compatible i18n for product strings.
//   tField('hello')              → 'hello'
//   tField({ko:'안녕', en:'hi'}) → 'hi' (or '안녕' depending on current lang)
// Use this everywhere a product field could be either a string (legacy / API
// passthrough) or a localized object. Falls back: current → en → ko → first.
function tField(v) {
  if (v == null) return '';
  if (typeof v === 'string' || typeof v === 'number') return v;
  if (Array.isArray(v)) return v.map(tField);
  const lang = window.__dtLang ? window.__dtLang.getLang() : 'en';
  return v[lang] || v.en || v.ko || v[Object.keys(v)[0]] || '';
}
window.tField = tField;

// ================================================================
// Deterministic mock data generators — used to make every product
// feel like a real, lived-in OTA listing even before we have a real
// content backend. The same product id always produces the same
// gallery, amenities, reviews, FAQ — so cards never visibly mutate.
// ================================================================

// Mulberry32 — tiny, fast, well-distributed seeded PRNG. Given the same
// 32-bit seed it always emits the same float sequence.
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seedFrom(str) {
  let h = 0x811c9dc5;
  const s = String(str || '');
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h >>> 0;
}
// Deterministic stable rating/reviews — used in normalize() so cards never
// mutate between renders. The mock detail page uses the same numbers via
// generateMockData(), so card ↔ detail are always in sync.
function stableRating(key) {
  const r = mulberry32(seedFrom(key));
  return Math.round((4.2 + r() * 0.7) * 10) / 10; // 4.2 ~ 4.9
}
function stableReviews(key) {
  const r = mulberry32(seedFrom(key));
  return Math.floor(120 + r() * 4680); // 120 ~ 4800
}

function pickN(rng, arr, n) {
  // shuffle copy, take first n — Fisher-Yates with seeded RNG
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, n);
}

// ---------- Main mock data generator ----------
// Returns { rating, reviewsCount, ratingBreakdown, photos, amenities, reviews, faq, highlights, rooms, schedule }
function generateMockData(product) {
  const seed = seedFrom(product.id || tField(product.name));
  const rng = mulberry32(seed);
  const lang = window.__dtLang ? window.__dtLang.getLang() : 'en';
  const cat = product.cat || 'Hotel';

  // Rating: weighted toward 4.4-4.9
  const baseRating = 4.2 + rng() * 0.7;
  const rating = Math.round(baseRating * 10) / 10;

  // Reviews count: between 120 and 4800
  const reviewsCount = Math.floor(120 + rng() * 4680);

  // Rating breakdown (5/4/3/2/1 star percentages)
  const p5 = 55 + Math.floor(rng() * 30); // 55-85%
  const p4 = Math.floor((100 - p5) * (0.55 + rng() * 0.2));
  const p3 = Math.floor((100 - p5 - p4) * (0.6 + rng() * 0.2));
  const p2 = Math.floor((100 - p5 - p4 - p3) * 0.6);
  const p1 = Math.max(0, 100 - p5 - p4 - p3 - p2);
  const ratingBreakdown = [
    { stars: 5, percent: p5 },
    { stars: 4, percent: p4 },
    { stars: 3, percent: p3 },
    { stars: 2, percent: p2 },
    { stars: 1, percent: p1 },
  ];

  // Photo gallery: 8-12 photos from a 40+ image pool — virtually no duplicates
  // within a city. Each photo carries a localized caption shown in the lightbox.
  const pool = PHOTO_GALLERY_POOLS[cat] || PHOTO_GALLERY_POOLS.Hotel;
  const photoCount = cat === 'Hotel' ? 12 : (cat === 'Activity' ? 10 : (cat === 'Flight' ? 8 : 8));
  const remaining = pool.filter(p => p.u !== product.img);
  const picked = pickN(rng, remaining, photoCount - 1);
  // First slot is the product's own hero image (no caption), then the picks.
  const photos = [{ u: product.img, c: null }, ...picked];

  // Amenities (hotel only — pick 10-14 from master list)
  const amenities = cat === 'Hotel'
    ? pickN(rng, ALL_AMENITIES, 10 + Math.floor(rng() * 5))
    : [];

  // Reviews: 16 mock reviews mixing locales + photos + helpful counts + host replies + tripType filter
  const templatesByLang = REVIEW_TEMPLATES[cat] || REVIEW_TEMPLATES.Hotel;
  const allReviewerNames = REVIEWER_NAMES.slice();
  const tripTypes = ['family', 'couple', 'solo', 'business', 'friends'];
  // Pre-pick a couple of reviewer-photo URLs from the gallery so reviews can
  // show user-submitted shots.
  const userPhotoPool = pool.slice();
  const reviews = [];
  for (let i = 0; i < 16; i++) {
    const langs = Object.keys(templatesByLang);
    const reviewLang = rng() < 0.5 ? lang : langs[Math.floor(rng() * langs.length)];
    const templates = templatesByLang[reviewLang] || templatesByLang.en || [];
    if (templates.length === 0) continue;
    const name = allReviewerNames[Math.floor(rng() * allReviewerNames.length)];
    const text = templates[Math.floor(rng() * templates.length)];
    const stars = rng() < 0.05 ? 3 : (rng() < 0.25 ? 4 : 5);
    const daysAgo = Math.floor(rng() * 180) + 1;
    // ~35% of reviews include 1-3 photos
    const hasPhotos = rng() < 0.35;
    const photoN = hasPhotos ? 1 + Math.floor(rng() * 3) : 0;
    const userPhotos = photoN > 0
      ? pickN(rng, userPhotoPool, photoN).map(p => p.u)
      : [];
    // Helpful count: weighted toward small numbers, occasionally large
    const helpful = Math.floor(Math.pow(rng(), 2.5) * 240);
    // ~20% have a host reply
    const hasReply = rng() < 0.2;
    const tripType = tripTypes[Math.floor(rng() * tripTypes.length)];
    reviews.push({
      name,
      stars,
      text,
      daysAgo,
      avatarColor: `hsl(${Math.floor(rng() * 360)}, 60%, 70%)`,
      verified: rng() < 0.85,
      photos: userPhotos,
      helpful,
      tripType,
      hostReply: hasReply ? buildHostReply(rng, lang, tripType) : null,
    });
  }

  // FAQ for this category
  const faqTpls = FAQ_TEMPLATES[cat] || FAQ_TEMPLATES.Hotel;
  const faq = faqTpls.map(item => ({
    q: item.q[lang] || item.q.en,
    a: item.a[lang] || item.a.en,
  }));

  // Highlights (hotel only for now)
  const highlights = cat === 'Hotel'
    ? pickN(rng, HOTEL_HIGHLIGHTS[lang] || HOTEL_HIGHLIGHTS.en, 4 + Math.floor(rng() * 3))
    : [];

  // Room types (hotel only)
  const rooms = cat === 'Hotel' ? (ROOM_TYPES[lang] || ROOM_TYPES.en) : [];

  // Activity schedule (timeline)
  const schedule = cat === 'Activity' ? buildActivitySchedule(rng, lang) : [];

  return { rating, reviewsCount, ratingBreakdown, photos, amenities, reviews, faq, highlights, rooms, schedule };
}

// ================= Travelpayouts deeplink helpers =================
// All affiliate redirects flow through here so commission is always tracked.
// Marker is appended server-side too (functions/api/_lib.js), this is a safety net
// for hard-coded links built on the client.
const TP_MARKER = '732326';                    // API marker
const TP_TRS    = '532633';                    // tracking script marker
const tpAttachMarker = (urlStr, subId) => {
  try {
    const u = new URL(urlStr);
    if (!u.searchParams.has('marker')) u.searchParams.set('marker', TP_MARKER);
    if (subId) u.searchParams.set('sub_id', subId);
    return u.toString();
  } catch { return urlStr; }
};
const tpDeeplink = (kind, params = {}) => {
  switch (kind) {
    case 'flight': {
      const { from='ICN', to='DAD', date='', adults=1, subId='' } = params;
      let dc = '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(date)) { const [, m, d] = date.split('-'); dc = d + m; }
      return tpAttachMarker(`https://www.aviasales.com/search/${from}${dc}${to}${adults}`, subId);
    }
    case 'hotel': {
      const { city='Da Nang', checkin='', checkout='', adults=2, subId='' } = params;
      const q = `https://search.hotellook.com/hotels?destination=${encodeURIComponent(city)}` +
        (checkin?`&checkIn=${checkin}`:'') + (checkout?`&checkOut=${checkout}`:'') + `&adults=${adults}`;
      return tpAttachMarker(q, subId);
    }
    case 'car': {
      const { city='Da Nang', pickup='', dropoff='', subId='' } = params;
      const u = `https://www.discovercars.com/?a_aid=${TP_MARKER}&country=any&location=${encodeURIComponent(city)}` +
        (pickup?`&pickupdate=${pickup}`:'') + (dropoff?`&dropoffdate=${dropoff}`:'');
      return u + (subId?`&sub_id=${encodeURIComponent(subId)}`:'');
    }
    case 'activity': {
      const { city='Da Nang', q='', subId='' } = params;
      const slug = (q || city).replace(/\s+/g,'-').toLowerCase();
      return `https://www.getyourguide.com/s/?q=${encodeURIComponent(q || city)}&partner_id=${TP_MARKER}&sub_id=${encodeURIComponent(subId || slug)}`;
    }
    default:
      return tpAttachMarker(`https://www.aviasales.com/?sub_id=${subId||''}`);
  }
};
window.tpDeeplink = tpDeeplink;

// Pick city image by stable index (hash of name) → same name always same photo
function cityImg(city, name) {
  const pool = CITY_IMG_POOL[city] || [LIVE_IMG.hotel];
  if (pool.length === 1 || !name) return pool[0];
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return pool[Math.abs(h) % pool.length];
}

async function fetchJsonSafe(url) {
  try {
    const r = await fetch(url, { headers:{ 'Accept':'application/json' } });
    if (!r.ok) return null;
    const ct = r.headers.get('content-type') || '';
    if (!ct.includes('json')) return null;
    return await r.json();
  } catch { return null; }
}

function normalizeHotel(h, city) {
  const cityName = h.location || city || 'Da Nang';
  const hotelName = h.name || `${cityName} Hotel`;
  // Server already picks the best photo (Hotellook CDN if hotelId, else curated
  // city-hotel pool). Fall back to client-side city pool only if it's missing.
  const img = h.image
    || (h.hotelId
          ? `https://photo.hotellook.com/image_v2/limit/h${h.hotelId}_1/800/520.auto`
          : cityImg(cityName, hotelName));
  return {
    id: `live_h_${h.hotelId || hotelName.replace(/\s+/g,'_').toLowerCase().slice(0,40)}`,

// Parse ISO 8601 duration (e.g. "PT5H30M") → "5h 30m"
function parseISODuration(dur) {
  if (!dur) return '';
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return dur;
  const h = parseInt(m[1] || '0', 10);
  const min = parseInt(m[2] || '0', 10);
  if (h && min) return `${h}h ${min}m`;
  if (h) return `${h}h`;
  return `${min}m`;
}

function normalizeFlight(f) {
  const isDuffel = f.provider === 'duffel';
  const toAirport = f.to || 'DAD';
  const cityFromAirport = AIRPORT_TO_CITY[toAirport] || toAirport;
  const durationStr = isDuffel ? parseISODuration(f.duration) : (f.duration || '');
  const airlineDisplay = (isDuffel ? f.airlineName : f.airline) || f.airline || 'Multiple';
  // Baggage info comes from Duffel already as a string; default per-locale otherwise.

const AIRPORT_TO_CITY = {
  SGN:'Ho Chi Minh', HAN:'Hanoi', DAD:'Da Nang', PQC:'Phu Quoc', CXR:'Nha Trang',
  BKK:'Bangkok', HKT:'Phuket', CNX:'Chiang Mai',
  DPS:'Bali', CGK:'Jakarta',
  MNL:'Manila', CEB:'Cebu', KLO:'Boracay',
  ICN:'Seoul', GMP:'Seoul', PUS:'Busan', CJU:'Jeju',
  NRT:'Tokyo', HND:'Tokyo', KIX:'Osaka', ITM:'Osaka', UKB:'Kyoto',
  PVG:'Shanghai', SHA:'Shanghai', PEK:'Beijing', PKX:'Beijing', HKG:'Hong Kong',
  KUL:'Kuala Lumpur', PEN:'Penang',
  SIN:'Singapore',
};

async function loadLiveCatalog() {
  // 25+ cities across 9 Asian countries
  const cities = [
    // Vietnam
    'Da Nang', 'Phu Quoc', 'Nha Trang', 'Ho Chi Minh', 'Hanoi',
    // Thailand
    'Bangkok', 'Phuket', 'Chiang Mai',
    // Indonesia
    'Bali', 'Jakarta',
    // Philippines
    'Manila', 'Cebu', 'Boracay',
    // Korea
    'Seoul', 'Busan', 'Jeju',
    // Japan
    'Tokyo', 'Osaka', 'Kyoto',
    // China / HK
    'Shanghai', 'Beijing', 'Hong Kong',
    // Malaysia
    'Kuala Lumpur', 'Penang',
    // Singapore
    'Singapore',
  ];
  const routes = [
    // From Korea
    { from:'ICN', to:'DAD' }, { from:'ICN', to:'BKK' }, { from:'ICN', to:'CGK' },
    { from:'ICN', to:'KIX' }, { from:'ICN', to:'SIN' }, { from:'ICN', to:'MNL' },
    // From Japan
    { from:'NRT', to:'SGN' }, { from:'NRT', to:'BKK' }, { from:'NRT', to:'DPS' },
    { from:'KIX', to:'KUL' }, { from:'KIX', to:'TPE' },
    // SEA internal
    { from:'SGN', to:'BKK' }, { from:'BKK', to:'PQC' }, { from:'BKK', to:'DPS' },
    { from:'BKK', to:'CGK' }, { from:'KUL', to:'SIN' }, { from:'SIN', to:'DPS' },
    { from:'MNL', to:'CEB' }, { from:'MNL', to:'NRT' },
    // China
    { from:'PVG', to:'BKK' }, { from:'PEK', to:'ICN' }, { from:'HKG', to:'BKK' },
  ];

  // Fan-out fetches in parallel; each catches its own failure
  const hotelReqs = cities.map(c =>
    fetchJsonSafe(`/api/hotels/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const carReqs = cities.map(c =>
    fetchJsonSafe(`/api/cars/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const actReqs = cities.map(c =>
    fetchJsonSafe(`/api/activities/search?city=${encodeURIComponent(c)}`).then(r => ({city:c, r})));
  const flightReqs = routes.map(rt =>
    fetchJsonSafe(`/api/flights/search?from=${rt.from}&to=${rt.to}`).then(r => ({...rt, r})));

  const [hotels, cars, acts, flights] = await Promise.all([
    Promise.all(hotelReqs),
    Promise.all(carReqs),
    Promise.all(actReqs),
    Promise.all(flightReqs),
  ]);

  const live = [];
  hotels.forEach(({city, r}) => (r?.results || []).forEach(h => live.push(normalizeHotel(h, city))));
  cars.forEach(({city, r})   => (r?.results || []).forEach(c => live.push(normalizeCar(c, city))));
  acts.forEach(({city, r})   => (r?.results || []).forEach(a => live.push(normalizeActivity(a))));
  flights.forEach(({r})      => (r?.results || []).forEach(f => live.push(normalizeFlight(f))));

  state.liveProducts = live;
  state.liveByCity = live.reduce((acc, p) => { acc[p.city] = (acc[p.city]||0)+1; return acc; }, {});
  state.liveLoaded = true;

  // Update external price averages for compare badges
  hotels.forEach(({city, r}) => refreshExtAvgFromExternal('hotels', r?.results || []));
  cars.forEach(({city, r})   => refreshExtAvgFromExternal('cars', r?.results || []));
  acts.forEach(({city, r})   => refreshExtAvgFromExternal('activities', r?.results || []));
  flights.forEach(({r})      => refreshExtAvgFromExternal('flights', r?.results || []));

  // Re-render current view if it depends on live data
  if (typeof router === 'function') router();
  return live;
}
window.loadLiveCatalog = loadLiveCatalog;

const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="dot"></span><span>${escapeHtml(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = 0; el.style.transform = 'translateY(8px)'; el.style.transition = 'all 220ms ease-out'; }, 2400);
  setTimeout(() => el.remove(), 2700);
}

// Lightbox modal — toggled by openLightbox(index)
function ensureLightboxMount() {
  if (document.getElementById('lightbox')) return;
  const el = document.createElement('div');
  el.id = 'lightbox';
  el.className = 'lightbox';
  el.innerHTML = `
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">✕</button>
    <button class="lb-prev" onclick="lightboxStep(-1)" aria-label="Previous">‹</button>
    <button class="lb-next" onclick="lightboxStep(1)" aria-label="Next">›</button>
    <img class="lb-img" alt="" />
    <div class="lb-caption"></div>
    <div class="lb-counter"></div>
  `;
  document.body.appendChild(el);
  // Backdrop click closes (but not when clicking the image or buttons)
  el.addEventListener('click', e => {
    if (e.target === el) closeLightbox();
  });
  // Swipe support for mobile
  let startX = 0;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = (e.changedTouches[0].clientX || 0) - startX;
    if (Math.abs(dx) > 50) lightboxStep(dx < 0 ? 1 : -1);
  }, { passive: true });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox')?.classList.contains('is-open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxStep(-1);
    if (e.key === 'ArrowRight') lightboxStep(1);
  });
}
window.openLightbox = function (i) {
  ensureLightboxMount();
  const arr = window.__galleryPhotos || [];
  if (arr.length === 0) return;
  window.__lbIdx = i || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('is-open');
  document.body.style.overflow = 'hidden'; // prevent body scroll
};
window.closeLightbox = function () {
  const el = document.getElementById('lightbox');
  if (el) el.classList.remove('is-open');
  document.body.style.overflow = '';
};
window.lightboxStep = function (delta) {
  const arr = window.__galleryPhotos || [];
  if (arr.length === 0) return;
  window.__lbIdx = ((window.__lbIdx || 0) + delta + arr.length) % arr.length;
  updateLightbox();
};
function updateLightbox() {
  const arr = window.__galleryPhotos || [];
  const i = window.__lbIdx || 0;
  const cur = arr[i];
  if (!cur) return;
  // Backwards-compat: accept either { u, c } object or raw URL string
  const url = (typeof cur === 'string') ? cur : cur.u;
  const cap = (typeof cur === 'string') ? null : cur.c;
  const lang = window.__dtLang ? window.__dtLang.getLang() : 'en';
  document.querySelector('#lightbox .lb-img').src = url || '';
  const captionText = cap ? (cap[lang] || cap.en || '') : '';
  const capEl = document.querySelector('#lightbox .lb-caption');
  capEl.textContent = captionText;
  capEl.style.display = captionText ? 'block' : 'none';
  document.querySelector('#lightbox .lb-counter').textContent = `${i + 1} / ${arr.length}`;
}

// Filter reviews by trip type. Called from the chip buttons.
window.filterReviews = function (f, btn) {
  const root = btn.closest('[data-reviews]');
  if (!root) return;
  root.querySelectorAll('.review-filter').forEach(b => b.classList.toggle('is-active', b === btn));
  let shown = 0;
  root.querySelectorAll('.review-card').forEach(card => {
    const trip = card.getAttribute('data-trip');
    const match = (f === 'all' || trip === f);
    if (match && shown < 6) {
      card.style.display = '';
      card.removeAttribute('data-overflow');
      shown++;
    } else if (match) {
      card.style.display = 'none';
      card.setAttribute('data-overflow', 'true');
    } else {
      card.style.display = 'none';
      card.removeAttribute('data-overflow');
    }
  });
  // Update "show more" button label/visibility
  const overflowCount = root.querySelectorAll('[data-overflow="true"]').length;
  const btnMore = root.querySelector('[data-show-more]');
  if (btnMore) btnMore.style.display = overflowCount > 0 ? '' : 'none';
};

window.showMoreReviews = function (btn) {
  const root = btn.closest('[data-reviews]');
  if (!root) return;
  root.querySelectorAll('.review-card[data-overflow="true"]').forEach(c => {
    c.style.display = '';
    c.removeAttribute('data-overflow');
  });
  btn.style.display = 'none';
};

window.bumpHelpful = function (btn) {
  const span = btn.querySelector('.review-helpful-count');
  if (!span) return;
  const n = parseInt(span.textContent.replace(/\D/g, ''), 10) || 0;
  span.textContent = `(${n + 1})`;
  btn.classList.add('is-pressed');
};

// Refresh external average prices after live API returns, then re-render cards in place.
function refreshExtAvgFromExternal(type, results) {
  if (!Array.isArray(results) || results.length === 0) return;
  // Average USD price per city, scoped to this category
  const byCity = {};
  results.forEach(r => {
    const city = r.location || r.city || r.to || '';
    const price = parseFloat(r.price);
    if (!city || !price) return;
    byCity[city] = byCity[city] || { sum: 0, n: 0 };
    byCity[city].sum += price;
    byCity[city].n += 1;
  });
  const catMap = { flights:'Flight', hotels:'Hotel', cars:'Transport', activities:'Activity' };
  const cat = catMap[type];
  if (!cat) return;
  Object.entries(byCity).forEach(([city, { sum, n }]) => {
    // Store as $1 tokens (external is in USD, divide by FX_RATE)
    state.extAvg[`${cat}|${city}`] = usdToToken(sum / n);
  });
}

// ============== External (Travelpayouts) results loader ==============
async function loadExternalResults() {
  const host = document.getElementById('externalResults');
  if (!host) return;
  const cat = host.dataset.cat || 'All';
  const q   = host.dataset.q || '';

  // Map our category → tp type
  const typeMap = {
    'All':'flights', 'Flights':'flights', 'Hotels':'hotels',
    'Tours':'activities', 'Activities':'activities', 'Transport':'cars'
  };
  const type = typeMap[cat] || 'activities';
  const city = q || (cat === 'Flights' ? '' : 'Da Nang');

  // Build query for the unified endpoint
  const u = new URL(location.origin + '/api/tp/search');
  u.searchParams.set('type', type);
  if (type === 'hotels')     { u.searchParams.set('city', city); }
  else if (type === 'cars')  { u.searchParams.set('city', city); }
  else if (type === 'activities') { u.searchParams.set('city', city); }
  else if (type === 'flights') {
    // Read values from search form if available, else use smart defaults
    const fromEl   = document.getElementById('s_from');
    const toEl     = document.getElementById('s_to');
    const dateEl   = document.getElementById('s_date');
    const adultsEl = document.getElementById('s_adults');
    const fromCode = fromEl?.value?.trim().toUpperCase() || host.dataset.from || 'ICN';
    const toCode   = toEl?.value?.trim().toUpperCase()   || host.dataset.to   || 'SGN';
    const dateVal  = dateEl?.value || host.dataset.date || '';
    const adultsVal= adultsEl?.value || '1';
    u.searchParams.set('from', fromCode);
    u.searchParams.set('to',   toCode);
    if (dateVal) u.searchParams.set('date', dateVal);
    u.searchParams.set('adults', adultsVal);
  }

  // Loading skeleton
  host.innerHTML = `
    <div class="row space-between items-center mb-16">
      <h3 class="h3">🌐 ${t('app.search.partnerHeading')}</h3>
      <span class="badge purple">${t('app.search.partnerCommission')}</span>
    </div>
    <div class="grid grid-3">
      ${Array.from({length:3}).map(()=>`
        <div class="glass-card" style="padding:18px;">
          <div class="shimmer" style="height:140px; border-radius:16px;"></div>
          <div class="shimmer mt-16" style="height:14px; width:60%; border-radius:6px;"></div>
          <div class="shimmer mt-8" style="height:14px; width:40%; border-radius:6px;"></div>
        </div>`).join('')}
    </div>`;

  let data;
  try {
    const r = await fetch(u.toString(), { headers: { 'Accept':'application/json' } });
    data = await r.json();
  } catch (e) {
    host.innerHTML = `<div class="glass-card" style="padding:20px;">⚠ Partner search unavailable. (${e.message})</div>`;
    return;
  }

  const results = (data && data.results) || [];

  // Refresh price-comparison averages, then re-render any visible internal cards
  refreshExtAvgFromExternal(type, results);
  document.querySelectorAll('a.product-card[href^="#/product/"]').forEach(card => {
    const id = (card.getAttribute('href') || '').split('/')[2];
    const p = PRODUCTS.find(x => x.id === id);
    if (p) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = productCard(p);
      const fresh = wrapper.firstElementChild;
      if (fresh) card.replaceWith(fresh);
    }
  });

  if (results.length === 0) {
    host.innerHTML = `
      <div class="row space-between items-center mb-16">
        <h3 class="h3">🌐 ${t('app.search.partnerHeading')}</h3>
      </div>
      <div class="glass-card" style="padding:24px;">
        <div class="t-muted">${t('app.search.partnerEmpty')}</div>
      </div>`;
    return;
  }

  host.innerHTML = `
    <div class="row space-between items-center mb-16" style="flex-wrap:wrap;gap:8px;">
      <h3 class="h3">🌐 ${t('app.search.partnerHeading')} <span class="t-small t-muted" style="font-weight:600;">· ${results.length} ${t('common.results').trim()}</span></h3>
      <span class="badge purple">${t('app.search.partnerCommission')}</span>
    </div>
    <div class="grid grid-3">
      ${results.map(r => externalCard(r, type)).join('')}
    </div>
  `;
}

function externalCard(r, type) {
  // Duffel flights: special rich card
  if (type === 'flights' && r.provider === 'duffel') {
    return duffelFlightCard(r);
  }

  // Normalize fields for display. Prefer the per-item image our server now sends
  // (hotels: Hotellook CDN, activities: keyword-matched, cars: type-matched).
  // Fall back to the city pool, then to the category default.
  let title, sub, img;
  const cityForFallback = r.city || r.location || r.to || '';
  if (type === 'flights') {
    title = `${r.from} → ${r.to}`;
    sub = `${r.airline||'Multiple'} · ${r.depart||''}`;
    img = r.image || cityImg(AIRPORT_TO_CITY[r.to] || cityForFallback, `${r.from}-${r.to}`) || LIVE_IMG.flight;
  } else if (type === 'hotels') {
    title = r.name || 'Hotel';
    sub = `${r.stars?'⭐'.repeat(Math.round(r.stars))+' · ':''}${r.location||''}`;
    img = r.image
      || (r.hotelId ? `https://photo.hotellook.com/image_v2/limit/h${r.hotelId}_1/800/520.auto` : null)
      || cityImg(cityForFallback, title)
      || LIVE_IMG.hotel;
  } else if (type === 'cars') {
    title = `${r.type} · ${r.model}`;
    sub = `${r.supplier} · ${r.seats} seats · ${r.transmission}`;
    img = r.image || cityImg(cityForFallback, r.model || r.type) || LIVE_IMG.car;
  } else {
    title = r.name || 'Activity';
    sub = `⭐ ${r.rating||'-'} · ${r.reviews||0} reviews`;
    img = r.image || cityImg(cityForFallback, title) || LIVE_IMG.activity;
  }
  const fallback = cityImg(cityForFallback, title) || LIVE_IMG[type === 'flights' ? 'flight' : (type === 'hotels' ? 'hotel' : (type === 'cars' ? 'car' : 'activity'))];
  const usd = r.price ? `$${fmt(r.price)}` : '—';
  return `
    <a class="product-card" href="${escapeHtml(r.bookingUrl||'#')}" target="_blank" rel="nofollow sponsored noopener">
      <div class="img" style="background-image:url('${img}'),url('${fallback}')">
        <span class="badge badge-on-image" style="background:linear-gradient(135deg,#E0D7FF,#C5B5FF);color:#4830b0;">🌐 External</span>
      </div>
      <div class="body">
        <div class="loc">via ${escapeHtml(({flights:'Aviasales',hotels:'Hotellook',cars:'DiscoverCars',activities:'GetYourGuide'})[type])}</div>
        <div class="title">${escapeHtml(title)}</div>
        <div class="meta">${escapeHtml(sub)}</div>
        <div class="price-row">
          <div><span style="font-size:20px;font-weight:800;color:var(--text-main);">${usd}</span> <span class="t-small t-muted">USD</span></div>
          <span class="btn btn-secondary btn-sm">${t('btn.book')}</span>
        </div>
      </div>
    </a>
  `;
}

function pageCheckout() {
  if (!state.cart) { setTimeout(()=>location.hash='#/', 100); return `<div class="glass-card" style="padding:28px;">No item selected.</div>`; }
  const { product, total, units, date } = state.cart;
  const wallet = state.wallet;
  const unitKey = product.cat==='Hotel' ? 'units.nights' : 'units.guestsPlural';
  return `
  <div class="page-enter" style="max-width:760px; margin:0 auto;">
    <div class="steps mb-16"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step"></div></div>

    <h2 class="h2">${t('app.checkout.title')}</h2>
    <p class="t-muted mt-8">${t('app.checkout.desc')}</p>

    <div class="glass-card mt-16" style="padding:24px;">
      <h4 class="h4">${t('app.checkout.summary')}</h4>
      <div class="row items-center mt-16 gap-16">
        <div style="width:88px;height:88px;border-radius:18px;background-image:url('${product.img}'),url('${product.imgFallback || cityImg(product.city, tField(product.name)) || LIVE_IMG.hotel}');background-size:cover;background-position:center;border:1px solid var(--glass-border);"></div>
        <div style="flex:1;">
          <div class="t-muted t-small">${trCountry(product.country)} · ${trCity(product.city)}</div>
          <div style="font-weight:800;font-size:16px;">${tField(product.name)}</div>
          <div class="t-muted t-small mt-8">${date} · ${units} ${t(unitKey)}</div>
        </div>
        <div style="text-align:right;">
          <div class="t-muted t-small">${t('common.total')}</div>
          <div style="font-size:22px;">${price(total)}</div>
        </div>
      </div>
    </div>

    <div class="glass-card mt-16" style="padding:24px;">
      <h4 class="h4">${t('app.checkout.wallet')}</h4>
      ${wallet ? `
        <div class="row items-center space-between mt-16">
          <div class="row gap-12 items-center">
            <span class="token-chip"><span class="coin">$</span>${fmt(wallet.balance)} $1</span>
            <span class="badge gray">${wallet.address}</span>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="disconnectWallet()">${t('btn.disconnect')}</button>
        </div>
      ` : `
        <button class="btn btn-primary btn-block mt-16" onclick="connectWallet()">${t('btn.connectWallet')}</button>
      `}
    </div>

    <div class="glass-card mt-16" style="padding:24px;">
      <h4 class="h4">${t('app.checkout.payment')}</h4>
      <div class="row space-between mt-16"><span class="t-muted">${t('common.amount')}</span><span>${price(total)}</span></div>
      <div class="row space-between mt-8"><span class="t-muted">${t('common.network')}</span><span>TON Chain</span></div>
      <div class="row space-between mt-8"><span class="t-muted">${t('common.token')}</span><span>$1</span></div>
      <div class="row space-between mt-8"><span class="t-muted">${t('app.checkout.networkFee')}</span><span class="t-small">~ 0.01 TON</span></div>

      ${wallet ? (wallet.balance >= total
        ? `<button class="btn btn-primary btn-block btn-lg mt-16" onclick="confirmPayment()">${t('btn.confirmPayment')}</button>`
        : `<div class="glass-card mt-16" style="padding:16px; border:1px solid rgba(255,138,61,0.5);">${t('app.checkout.insufficient')}</div>
           <button class="btn btn-secondary btn-block btn-lg mt-16" disabled>${t('btn.confirmPayment')}</button>`
      ) : `<button class="btn btn-primary btn-block btn-lg mt-16" onclick="connectWallet()">${t('btn.connectFirst')}</button>`}
    </div>
  </div>
  `;
}

          const unitKey = b.product.cat==='Hotel' ? 'units.nights' : 'units.guestsPlural';
          return `
          <div class="glass-card" style="padding:18px; display:flex; gap:16px;">
            <div style="width:96px;height:96px;border-radius:18px;background-image:url('${b.product.img}'),url('${b.product.imgFallback || cityImg(b.product.city, tField(b.product.name)) || LIVE_IMG.hotel}');background-size:cover;background-position:center; flex-shrink:0;"></div>
            <div style="flex:1;">
              <div class="row space-between items-center">
                <span class="badge ${badgeForStatus(b.status)}">${t('status.'+b.status)}</span>
                <span class="t-small t-muted">${b.id}</span>
              </div>
              <div style="font-weight:800;font-size:15px;margin-top:6px;">${tField(b.product.name)}</div>
              <div class="t-small t-muted">${b.date} · ${b.units} ${t(unitKey)}</div>

                <span>${price(b.amount)}</span>

              </div>
            </div>
          </div>
        `}).join('')}
      </div>
    `}
  </div>
  `;
}
function badgeForStatus(s) {
  return ({
    'Payment Completed':'status-paid',
    'Pending Confirmation':'status-pending',
    'Confirmed':'status-confirmed',
    'Completed':'status-completed',
    'Cancelled':'status-cancelled'
  })[s] || 'gray';
}

// ================= Actions =================
// $1 token payment is COMING SOON. For now we surface a Coming-Soon modal +
// the affiliate booking link. We ALSO drop a pending order into shared storage
// so the admin Payouts queue can preview the full flow.
function proceedCheckout(productId) {
  const p = (typeof getCatalog === 'function' ? getCatalog() : PRODUCTS).find(x => x.id === productId);
  if (!p) return;
  // Stage a "pending order" — admin's Payouts queue will pick this up
  try {
    const orders = JSON.parse(localStorage.getItem('dt_pending_orders') || '[]');
    const wallet = state.wallet?.address || (state.user?.email || 'guest');
    orders.unshift({
      id: 'po_' + Date.now().toString(36),
      bookingId: 'DT' + Math.floor(100000 + Math.random()*900000),
      user: wallet,
      product: p.name, partner: p.source === 'live' ? 'Travelpayouts' : 'DallyTrip Direct',
      received: Number(p.price || 0),
      toPay: Number((p.priceUSD || p.price * 3) || 0),
      currency: 'USD', method: 'manual', status: 'queued',
      createdAt: new Date().toISOString().replace('T',' ').slice(0,16),
      productId, city: p.city, country: p.country, img: p.img
    });
    localStorage.setItem('dt_pending_orders', JSON.stringify(orders.slice(0, 50)));
  } catch {}
  showPaymentSoonModal(p);
}

function showPaymentSoonModal(p) {
  const isFlight = p.cat === 'Flight';
  const isTransport = p.cat === 'Transport' || p.cat === 'Pickup';
  const isHotel = p.cat === 'Hotel';
  const sub = `dt_${p.id}`;
  let partnerUrl = p.bookingUrl;
  if (!partnerUrl) {
    if (isFlight)         partnerUrl = tpDeeplink('flight',   { from:p.fromCode, to:p.toCode, date:'2026-06-12', adults:2, subId:sub });
    else if (isHotel)     partnerUrl = tpDeeplink('hotel',    { city:p.city, checkin:'2026-06-12', checkout:'2026-06-14', adults:2, subId:sub });
    else if (isTransport) partnerUrl = tpDeeplink('car',      { city:p.city, pickup:'2026-06-12', dropoff:'2026-06-13', subId:sub });
    else                  partnerUrl = tpDeeplink('activity', { city:p.city, q:p.name, subId:sub });
  }
  const lang = (window.__DT_LANG || 'ko');
  const L = {
    title:   { ko:'$1 토큰 결제는 곧 오픈됩니다', en:'$1 Token payment is coming soon', ja:'$1トークン決済は近日公開', zh:'$1 代币支付即将上线' },
    desc:    { ko:'지금은 외부 파트너에서 예약하실 수 있어요. 결제·예약 흐름이 완성되는 대로 알림드릴게요.', en:'For now you can book on a partner site. We\'ll notify you once $1 checkout opens.', ja:'現在は提携先で予約可能。$1決済が公開され次第お知らせします。', zh:'目前可在合作伙伴网站预订。$1 结账上线后会通知您。' },
    partner: { ko:'외부 파트너에서 예약하기', en:'Book on partner site', ja:'パートナーで予約', zh:'前往合作伙伴预订' },
    close:   { ko:'닫기', en:'Close', ja:'閉じる', zh:'关闭' },
    notify:  { ko:'오픈 시 알림 받기', en:'Notify me on launch', ja:'公開時に通知', zh:'上线时通知我' },
  };
  const modal = document.createElement('div');
  modal.className = 'dt-modal-backdrop';
  modal.innerHTML = `
    <div class="dt-modal glass-card" role="dialog" aria-modal="true">
      <button class="dt-modal-close" onclick="this.closest('.dt-modal-backdrop').remove()" aria-label="Close">×</button>
      <div style="font-size:48px;text-align:center;line-height:1;">🪙</div>
      <h3 class="h3 mt-16 text-center">${L.title[lang] || L.title.en}</h3>
      <p class="t-muted mt-8 text-center">${L.desc[lang] || L.desc.en}</p>
      <div class="glass-card tight mt-16" style="padding:14px;">
        <div class="row gap-12 items-center">
          <div style="width:56px;height:56px;border-radius:14px;background:url('${p.img}') center/cover; flex-shrink:0;"></div>
          <div style="flex:1; min-width:0;">
            <div class="t-small t-muted" style="font-weight:700;">${trCountry(p.country)} · ${trCity(p.city)}</div>
            <div style="font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(p.name)}</div>
            <div style="font-weight:800; color:var(--token-green);">${fmtToken(p.price)} <span style="font-size:11px;">$1</span></div>
          </div>
        </div>
      </div>
      <a class="btn btn-primary btn-block btn-lg mt-16" href="${escapeHtml(partnerUrl)}" target="_blank" rel="nofollow sponsored noopener" onclick="setTimeout(()=>this.closest('.dt-modal-backdrop').remove(), 400)">
        🌐 ${L.partner[lang] || L.partner.en} →
      </a>
      <button class="btn btn-ghost btn-block mt-8" onclick="dtNotifyMe('${p.id}')">${L.notify[lang] || L.notify.en}</button>
      <button class="btn btn-ghost btn-block mt-8" onclick="this.closest('.dt-modal-backdrop').remove()">${L.close[lang] || L.close.en}</button>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}
window.showPaymentSoonModal = showPaymentSoonModal;

function dtNotifyMe(productId) {
  const subs = JSON.parse(localStorage.getItem('dt_notify') || '[]');
  if (!subs.includes(productId)) {
    subs.push(productId);
    localStorage.setItem('dt_notify', JSON.stringify(subs));
  }
  toast(({ ko:'$1 결제 오픈 시 알려드릴게요', en:'We\'ll notify you on launch', ja:'公開時に通知します', zh:'上线时会通知您' })[window.__DT_LANG||'ko'] || 'Notify saved');
  document.querySelector('.dt-modal-backdrop')?.remove();
}
window.dtNotifyMe = dtNotifyMe;
window.proceedCheckout = proceedCheckout;
window.connectWallet = connectWallet;
window.disconnectWallet = disconnectWallet;

function confirmPayment() {
  if (!state.wallet || !state.cart) return;
  toast(t('toast.waitingWallet'));
  setTimeout(() => toast(t('toast.txPending')), 600);
  setTimeout(() => {
    const id = 'DT' + Math.floor(100000 + Math.random()*900000);
    const tx = 'EQ' + Math.random().toString(36).slice(2,10).toUpperCase();
    state.bookings.unshift({
      id,
      product: state.cart.product,
      amount: state.cart.total,
      units: state.cart.units,
      date: state.cart.date,
      status: 'Pending Confirmation',
      tx,
      createdAt: new Date().toISOString().slice(0,10)
    });
    state.wallet.balance -= state.cart.total;
    state.cart = null;
    saveState();
    renderTopRight();
    toast(t('toast.paymentConfirmed'));
    setTimeout(() => { location.hash = '#/booking-success/' + id; }, 600);
  }, 1300);
}
window.confirmPayment = confirmPayment;

function onSearchSubmit() {
  const v = document.getElementById('searchInput').value.trim();
  location.hash = '#/search?q=' + encodeURIComponent(v) + (state.filter.category!=='All' ? '&cat='+encodeURIComponent(state.filter.category):'');
}
window.onSearchSubmit = onSearchSubmit;

// ================= Router =================
function router() {
  const hash = location.hash || '#/';
  const [path, qs] = hash.replace(/^#/, '').split('?');
  const params = new URLSearchParams(qs || '');
  const view = document.getElementById('view');
  let html = '';
  if (path === '/' || path === '') html = pageHome();
  else if (path === '/search') html = pageSearch(params);
  else if (path.startsWith('/product/')) html = pageProduct(path.split('/')[2]);
  else if (path === '/checkout') html = pageCheckout();
  else if (path.startsWith('/booking-success/')) html = pageBookingSuccess(path.split('/')[2]);
  else if (path === '/bookings') html = pageBookings();
  else if (path === '/wallet') html = pageWallet();
  else if (path === '/profile') html = pageProfile();
  else html = `<div class="glass-card" style="padding:32px;">Page not found.</div>`;
  view.innerHTML = html;
  renderBottomNav();
  bindProductTotals();
  window.scrollTo({ top: 0, behavior: 'instant' });
  // After the page is in the DOM, fetch live partner results (if any)
  if (document.getElementById('externalResults')) {
    setTimeout(() => loadExternalResults(), 30);
  }
}

function bindProductTotals() {
  const adults = document.getElementById('b_adults');
  const totalEl = document.getElementById('b_total');
  const unitsEl = document.getElementById('b_units');
  if (!adults || !totalEl) return;
  const path = (location.hash||'').replace(/^#/, '').split('?')[0];
  const id = path.split('/')[2];
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const opt = document.getElementById('b_option');
  const recompute = () => {
    const n = parseInt(adults.value || '1');
    let extra = 0;
    if (opt) {
      const v = opt.value;
      const m = v.match(/\+(\d+)/);
      if (m) extra = parseInt(m[1]);
    }
    totalEl.innerHTML = price((p.price + extra) * n);
    if (unitsEl) unitsEl.textContent = `x ${n}`;
  };
  adults.addEventListener('change', recompute);
  if (opt) opt.addEventListener('change', recompute);
}

window.addEventListener('hashchange', router);
window.addEventListener('dt:lang', () => { renderTopRight(); router(); });
window.addEventListener('load', () => {
  renderTopRight();
  router();
  // Fire-and-forget live catalog load — re-renders when done
  loadLiveCatalog();
});

// Unified getter: prefers live catalog, falls back to local mock
function getCatalog() {
  return state.liveLoaded && state.liveProducts.length > 0
    ? [...state.liveProducts, ...PRODUCTS]
    : PRODUCTS;
}
window.getCatalog = getCatalog;
</script>
